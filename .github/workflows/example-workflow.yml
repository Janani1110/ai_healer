# Example GitHub Actions workflow that the agent can monitor and heal

name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd agent-core
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd agent-core
        pytest tests/ -v
    
    - name: Lint code
      run: |
        cd agent-core
        flake8 app/ --max-line-length=120

  build-dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd dashboard
        npm ci
    
    - name: Build
      run: |
        cd dashboard
        npm run build
    
    - name: Run tests
      run: |
        cd dashboard
        npm test

# When this workflow fails, the Self-Healing Agent will:
# 1. Detect the failure
# 2. Analyze the error logs
# 3. Generate an appropriate fix
# 4. Commit the fix
# 5. Re-trigger this workflow
