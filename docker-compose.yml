version: '3.8'

services:
  agent:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./agent.db
    volumes:
      - ./agent-core:/app
      - agent-data:/app/data
    restart: unless-stopped
    networks:
      - ci-healer

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - agent
    networks:
      - ci-healer

volumes:
  agent-data:

networks:
  ci-healer:
    driver: bridge
